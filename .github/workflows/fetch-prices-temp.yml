name: Fetch price data (temp)

on:
  push:
    branches: [claude/new-session-5m5p93]

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Download price PDFs from Google Drive
        run: |
          mkdir -p out
          dl() {
            # $1 = name, $2 = drive file id
            curl -sL -o "out/$1.pdf" -w "$1: http:%{http_code} bytes:%{size_download}\n" \
              "https://drive.google.com/uc?export=download&id=$2" || true
            file "out/$1.pdf" || true
          }
          dl depilation   "1NbFmpwkI2vYWXtPbx6dlC-dM1DrG7B5l"
          dl kosmetologie "1Dm6tt2S1rUoALHJ0cTjiZiUCm5rTgTi-"
          dl homecare     "1KH-Jtb3u5N5fIP0p0dwJTzWqYVZyauw7"
          dl kurs         "14QiZqRreUs_XFDisnO-SHTRr5DudinZR"
          ls -la out
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: price-pdfs
          path: out/
          retention-days: 1
